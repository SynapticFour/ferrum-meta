name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LinkML
        run: pip install linkml

      - name: Lint schemas
        run: |
          linkml-lint schema/core/ferrum-core.yaml
          linkml-lint schema/profiles/ghga-profile.yaml
          linkml-lint schema/profiles/ega-profile.yaml
          linkml-lint schema/profiles/eva-profile.yaml
          linkml-lint schema/profiles/h3africa-profile.yaml
          linkml-lint schema/profiles/pathogen-profile.yaml

      - name: Validate valid fixtures
        run: |
          for fixture in fixtures/valid/*.yaml; do
            echo "=== ${fixture} ==="
            ./scripts/validate-fixture.sh "${fixture}"
          done

      - name: Confirm invalid fixtures fail
        run: |
          for fixture in fixtures/invalid/*.yaml; do
            echo "=== expecting failure: ${fixture} ==="
            if ./scripts/validate-fixture.sh "${fixture}"; then
              echo "ERROR: invalid fixture passed validation: ${fixture}" >&2
              exit 1
            fi
          done
