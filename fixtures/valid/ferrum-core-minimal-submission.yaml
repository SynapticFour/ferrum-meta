ferrum_meta_version: "0.1.0"

studies:
  - alias: study001
    title: "Example population genomics study in East Africa"
    description: >-
      A minimum valid ferrum-core submission fixture for offline validation testing.
      This study captures WGS metadata from a rural field laboratory setting with
      community consent and Crypt4GH-encrypted FASTQ files.
    type: POPULATION_GENOMICS

individuals:
  - alias: ind001
    sex: FEMALE
    phenotype:
      - "HP:0000001"
    ancestry: "HANCESTRO:0005"
    consent_type: COMMUNITY
    consent_code: "H3A-CONSENT-2026-001"

samples:
  - alias: sample001
    individual_alias: ind001
    tissue_type: "buccal mucosa"
    biospecimen_type: BUCCAL_SWAB

experiments:
  - alias: exp001
    sample_alias: sample001
    sequencing_platform: BGI
    library_strategy: WGS
    library_source: GENOMIC

files:
  - alias: file001_R1.fastq.gz
    format: FASTQ
    checksum_md5: "d41d8cd98f00b204e9800998ecf8427e"
    encryption: CRYPT4GH

datasets:
  - alias: dataset001
    title: "Example WGS dataset — community consent cohort"
    description: >-
      Controlled-access dataset comprising one Crypt4GH-encrypted FASTQ file
      from a buccal swab WGS experiment under community consent.
    file_aliases:
      - file001_R1.fastq.gz
    data_use_conditions:
      - "DUO:0000006"
